openapi: 3.0.0
info:
  title: MPC Plus API
  description: API for managing beam data, geometry checks, machines, results, thresholds, DOC factors, reports, and application settings
  version: 2.0.0
  contact:
    name: API Support
    email: support@example.com

servers:
  - url: http://localhost:5000/api
    description: Local Docker environment
  - url: http://localhost:5132/api
    description: Local development environment

tags:
  - name: Beams
    description: Beam check data and variants
  - name: Geochecks
    description: Geometry check measurements
  - name: Machines
    description: Machine management
  - name: Results
    description: Aggregated monthly calendar results
  - name: Thresholds
    description: Threshold configuration
  - name: Updates
    description: Activity log / update entries
  - name: DOC Factors
    description: Dose Output Correction factors
  - name: Reports
    description: PDF report generation
  - name: Settings
    description: Application settings (timezone, etc.)

paths:
  # ============================================================
  # Beams
  # ============================================================
  /beams:
    get:
      tags:
        - Beams
      summary: Get all beams (grouped)
      description: >
        Retrieves beam data, optionally filtered by type, machine, and date range.
        Returns beams grouped by time proximity (~2 minutes) as CheckGroup objects,
        ordered by latest group first. Each beam includes dynamically calculated
        PASS/FAIL status based on thresholds.
      parameters:
        - name: type
          in: query
          required: false
          schema:
            type: string
          description: Type of beam (e.g., 6e, 9e, 12e, 16e, 10x, 15x, 6xFFF)
        - name: machineId
          in: query
          required: false
          schema:
            type: string
          description: Machine identifier
        - name: date
          in: query
          required: false
          schema:
            type: string
            format: date
          description: Specific date for beam data
        - name: startDate
          in: query
          required: false
          schema:
            type: string
            format: date
          description: Start date for date range
        - name: endDate
          in: query
          required: false
          schema:
            type: string
            format: date
          description: End date for date range
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CheckGroup'

    post:
      tags:
        - Beams
      summary: Create a beam
      description: Creates a new beam entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Beam'
      responses:
        '201':
          description: Beam created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Beam'
        '400':
          description: Bad request
        '409':
          description: Conflict - beam already exists

  /beams/{id}:
    get:
      tags:
        - Beams
      summary: Get beam by ID
      description: Retrieves a single beam by its identifier. Includes dynamically calculated status.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Unique beam identifier
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Beam'
        '404':
          description: Beam not found

    put:
      tags:
        - Beams
      summary: Update beam
      description: Updates an existing beam. The ID in the route must match the payload.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Unique beam identifier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Beam'
      responses:
        '204':
          description: Beam updated successfully
        '400':
          description: Bad request - ID mismatch
        '404':
          description: Beam not found

    delete:
      tags:
        - Beams
      summary: Delete beam
      description: Removes a beam from the system
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Unique beam identifier
      responses:
        '204':
          description: Beam deleted successfully
        '404':
          description: Beam not found

  /beams/types:
    get:
      tags:
        - Beams
      summary: Get beam types
      description: Returns a list of all distinct beam types
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

  /beams/variants:
    get:
      tags:
        - Beams
      summary: Get beam variants with IDs
      description: Returns all beam variants with their UUIDs from the beam_variants table
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BeamVariantDto'

  /beams/by-date:
    get:
      tags:
        - Beams
      summary: Get beam checks for DOC factor selection
      description: >
        Returns beam check options for a specific date, machine, and beam type.
        Used when selecting a beam check for DOC factor creation.
      parameters:
        - name: machineId
          in: query
          required: true
          schema:
            type: string
          description: Machine identifier
        - name: beamType
          in: query
          required: true
          schema:
            type: string
          description: Beam type (e.g., 6x, 6e)
        - name: date
          in: query
          required: true
          schema:
            type: string
            format: date
          description: Date to query (YYYY-MM-DD)
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BeamCheckOption'
        '400':
          description: Bad request - missing required parameters or invalid date

  /beams/accept:
    post:
      tags:
        - Beams
      summary: Accept multiple beams
      description: Marks multiple beams as accepted/approved by a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AcceptBeamRequest'
      responses:
        '200':
          description: Beams accepted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  approved:
                    type: array
                    items:
                      type: string
                    description: IDs of successfully approved beams
                  errors:
                    type: array
                    items:
                      type: string
                    description: Error messages for beams that could not be approved
        '400':
          description: Bad request - no beam IDs provided

  # ============================================================
  # Geochecks
  # ============================================================
  /geochecks:
    get:
      tags:
        - Geochecks
      summary: Get geometry checks
      description: Retrieves geometry check data, optionally filtered by machine, type, and date range. Returns full details including MLC leaf data.
      parameters:
        - name: machine-id
          in: query
          required: false
          schema:
            type: string
          description: Machine identifier
        - name: type
          in: query
          required: false
          schema:
            type: string
          description: Type of beam (e.g., 6xFFF)
        - name: date
          in: query
          required: false
          schema:
            type: string
            format: date
          description: Specific date for geometry check
        - name: start-date
          in: query
          required: false
          schema:
            type: string
            format: date
          description: Start date for date range
        - name: end-date
          in: query
          required: false
          schema:
            type: string
            format: date
          description: End date for date range
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GeoCheck'
        '400':
          description: Bad request - invalid date format

    post:
      tags:
        - Geochecks
      summary: Create a geometry check
      description: Creates a new geometry check entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GeoCheck'
      responses:
        '201':
          description: Geometry check created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeoCheck'
        '400':
          description: Bad request
        '409':
          description: Conflict - geometry check already exists
        '500':
          description: Internal server error

  /geochecks/{id}:
    get:
      tags:
        - Geochecks
      summary: Get geometry check by ID
      description: Retrieves a single geometry check by its identifier
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Unique geometry check identifier
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeoCheck'
        '404':
          description: Geometry check not found

    put:
      tags:
        - Geochecks
      summary: Update geometry check
      description: Updates an existing geometry check. The ID in the route must match the payload.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Unique geometry check identifier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GeoCheck'
      responses:
        '204':
          description: Geometry check updated successfully
        '400':
          description: Bad request - ID mismatch
        '404':
          description: Geometry check not found

    delete:
      tags:
        - Geochecks
      summary: Delete geometry check
      description: Removes a geometry check from the system
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Unique geometry check identifier
      responses:
        '204':
          description: Geometry check deleted successfully
        '404':
          description: Geometry check not found

  /geochecks/accept:
    post:
      tags:
        - Geochecks
      summary: Accept multiple geometry checks
      description: Marks multiple geometry checks as accepted/approved by a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AcceptGeoCheckRequest'
      responses:
        '200':
          description: Geometry checks accepted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  approved:
                    type: array
                    items:
                      type: string
                    description: IDs of successfully approved geometry checks
                  errors:
                    type: array
                    items:
                      type: string
                    description: Error messages for checks that could not be approved
        '400':
          description: Bad request - no geometry check IDs provided

  # ============================================================
  # Machines
  # ============================================================
  /machines:
    get:
      tags:
        - Machines
      summary: Get all machines
      description: Returns a list of all machines
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Machine'

    post:
      tags:
        - Machines
      summary: Create a machine
      description: Creates a new machine entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Machine'
      responses:
        '201':
          description: Machine created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Machine'
        '409':
          description: Conflict - machine already exists

  /machines/{id}:
    get:
      tags:
        - Machines
      summary: Get machine by ID
      description: Retrieves a single machine by its identifier
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Unique machine identifier
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Machine'
        '404':
          description: Machine not found

    put:
      tags:
        - Machines
      summary: Update machine
      description: Updates an existing machine. The ID in the route must match the payload.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Unique machine identifier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Machine'
      responses:
        '204':
          description: Machine updated successfully
        '400':
          description: Bad request - ID mismatch
        '404':
          description: Machine not found

    delete:
      tags:
        - Machines
      summary: Delete machine
      description: Removes a machine from the system
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Unique machine identifier
      responses:
        '204':
          description: Machine deleted successfully
        '404':
          description: Machine not found

  # ============================================================
  # Results
  # ============================================================
  /results:
    get:
      tags:
        - Results
      summary: Get monthly results
      description: >
        Retrieves aggregated daily check statuses for a specific month, year, and machine.
        Combines beam and geometry check data into a calendar view with per-day
        status, approval state, and counts.
      parameters:
        - name: month
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 12
          description: Month (1-12)
        - name: year
          in: query
          required: true
          schema:
            type: integer
            minimum: 1900
            maximum: 2100
          description: Year
        - name: machineId
          in: query
          required: true
          schema:
            type: string
          description: Machine identifier
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MonthlyResults'
        '400':
          description: Bad request - invalid parameters

  # ============================================================
  # Thresholds
  # ============================================================
  /thresholds/all:
    get:
      tags:
        - Thresholds
      summary: Get all thresholds
      description: Returns all threshold configurations across all machines and check types
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Threshold'

  /thresholds:
    post:
      tags:
        - Thresholds
      summary: Save/upsert a threshold
      description: Creates or updates a threshold configuration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Threshold'
      responses:
        '200':
          description: Threshold saved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Threshold'
        '500':
          description: Internal server error

  # ============================================================
  # Updates
  # ============================================================
  /updates:
    get:
      tags:
        - Updates
      summary: Get all updates
      description: Returns a list of all activity log entries
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Update'
        '500':
          description: Internal server error

    post:
      tags:
        - Updates
      summary: Create a new update
      description: Adds a new activity log entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Update'
      responses:
        '201':
          description: Update created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Update'
        '400':
          description: Bad request
        '500':
          description: Internal server error

    put:
      tags:
        - Updates
      summary: Update an existing update
      description: Modifies an existing activity log entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Update'
      responses:
        '200':
          description: Update modified successfully
        '404':
          description: Update not found
        '500':
          description: Internal server error

    delete:
      tags:
        - Updates
      summary: Delete an update
      description: Removes an activity log entry
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: string
          description: Update identifier
      responses:
        '204':
          description: Update deleted successfully
        '404':
          description: Update not found
        '500':
          description: Internal server error

  /updates/{id}:
    get:
      tags:
        - Updates
      summary: Get update by ID
      description: Retrieves a single update by its identifier
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Unique update identifier
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Update'
        '404':
          description: Update not found
        '500':
          description: Internal server error

  # ============================================================
  # DOC Factors
  # ============================================================
  /docfactors:
    get:
      tags:
        - DOC Factors
      summary: Get all DOC factors
      description: Returns all DOC factors, optionally filtered by machine
      parameters:
        - name: machineId
          in: query
          required: false
          schema:
            type: string
          description: Filter by machine identifier
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DocFactor'

    post:
      tags:
        - DOC Factors
      summary: Create a DOC factor
      description: >
        Creates a new DOC factor. Automatically adjusts date ranges
        of existing factors for the same machine/variant.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DocFactor'
      responses:
        '201':
          description: DOC factor created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocFactor'
        '500':
          description: Internal server error

  /docfactors/applicable:
    get:
      tags:
        - DOC Factors
      summary: Get applicable DOC factor
      description: Returns the DOC factor that is applicable for a specific machine, beam variant, and date
      parameters:
        - name: machineId
          in: query
          required: true
          schema:
            type: string
          description: Machine identifier
        - name: beamVariantId
          in: query
          required: true
          schema:
            type: string
            format: uuid
          description: Beam variant UUID
        - name: date
          in: query
          required: true
          schema:
            type: string
            format: date
          description: Date to find applicable factor (YYYY-MM-DD)
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocFactor'
        '400':
          description: Bad request - missing required parameters or invalid date
        '404':
          description: No applicable DOC factor found

  /docfactors/{id}:
    put:
      tags:
        - DOC Factors
      summary: Update a DOC factor
      description: Updates an existing DOC factor
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: DOC factor identifier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DocFactor'
      responses:
        '200':
          description: DOC factor updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocFactor'
        '500':
          description: Internal server error

    delete:
      tags:
        - DOC Factors
      summary: Delete a DOC factor
      description: Removes a DOC factor from the system
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: DOC factor identifier
      responses:
        '204':
          description: DOC factor deleted successfully
        '500':
          description: Internal server error

  # ============================================================
  # Reports
  # ============================================================
  /reports/generate:
    post:
      tags:
        - Reports
      summary: Generate a PDF report
      description: >
        Generates a report based on the provided request.
        Returns a single PDF for single-day data, or a ZIP archive
        containing one PDF per day for multi-day data.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReportRequest'
      responses:
        '200':
          description: Report generated successfully
          content:
            application/pdf:
              schema:
                type: string
                format: binary
            application/zip:
              schema:
                type: string
                format: binary
        '400':
          description: Bad request - invalid date range or missing machine ID
        '500':
          description: Internal server error

  # ============================================================
  # Settings
  # ============================================================
  /settings/timezone:
    get:
      tags:
        - Settings
      summary: Get configured timezone
      description: Returns the configured IANA timezone for the application, or null if not set
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  timezone:
                    type: string
                    nullable: true
                    description: IANA timezone string (e.g., America/Chicago)

    put:
      tags:
        - Settings
      summary: Set timezone
      description: Upserts the application timezone. Must be a valid IANA timezone identifier.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TimezoneRequest'
      responses:
        '200':
          description: Timezone set successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  timezone:
                    type: string
                    description: The timezone that was set
        '400':
          description: Bad request - empty or unknown timezone

# ============================================================
# Components
# ============================================================
components:
  schemas:
    # ── Beam ─────────────────────────────────────────────────
    Beam:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier (UUID)
        type:
          type: string
          description: Type of beam (e.g., 6e, 9e, 12e, 16e, 10x, 15x, 6xFFF)
        timestamp:
          type: string
          format: date-time
          description: UTC timestamp of the beam data
        path:
          type: string
          nullable: true
          description: File path to beam data
        relUniformity:
          type: number
          format: double
          nullable: true
          description: Relative uniformity value
        relOutput:
          type: number
          format: double
          nullable: true
          description: Relative output value
        centerShift:
          type: number
          format: double
          nullable: true
          description: Center shift value (for X-Beam only)
        machineId:
          type: string
          description: Associated machine identifier
        note:
          type: string
          nullable: true
          description: Notes about the beam
        approvedBy:
          type: string
          nullable: true
          description: Name of the person who accepted/signed off the beam check
        approvedDate:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when the beam check was accepted/signed off
        horiFlatness:
          type: number
          format: float
          nullable: true
          description: Horizontal flatness value
        vertFlatness:
          type: number
          format: float
          nullable: true
          description: Vertical flatness value
        horiSymmetry:
          type: number
          format: float
          nullable: true
          description: Horizontal symmetry value
        vertSymmetry:
          type: number
          format: float
          nullable: true
          description: Vertical symmetry value
        imagePaths:
          type: object
          additionalProperties:
            type: string
          nullable: true
          description: Image paths dictionary (e.g., beamImage, horzProfile mapped to URLs)
        typeID:
          type: string
          format: uuid
          nullable: true
          description: Foreign key to beam_variants table
        value:
          type: number
          format: double
          nullable: true
          description: Computed convenience value (priority - RelOutput, RelUniformity, CenterShift)
        status:
          type: string
          nullable: true
          enum: [PASS, FAIL]
          description: Overall status (dynamically computed from thresholds)
        relOutputStatus:
          type: string
          nullable: true
          enum: [PASS, FAIL]
          description: Relative output threshold status (dynamically computed)
        relUniformityStatus:
          type: string
          nullable: true
          enum: [PASS, FAIL]
          description: Relative uniformity threshold status (dynamically computed)
        centerShiftStatus:
          type: string
          nullable: true
          enum: [PASS, FAIL]
          description: Center shift threshold status (dynamically computed)
      required:
        - id
        - type
        - timestamp
        - machineId

    # ── CheckGroup ───────────────────────────────────────────
    CheckGroup:
      type: object
      description: A group of beams captured within ~2 minutes of each other
      properties:
        timestamp:
          type: string
          format: date-time
          description: Reference timestamp for the group
        beams:
          type: array
          items:
            $ref: '#/components/schemas/Beam'
          description: Beams in this group
      required:
        - timestamp
        - beams

    # ── BeamVariantDto ───────────────────────────────────────
    BeamVariantDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the beam variant
        variant:
          type: string
          description: Variant name (e.g., 6x, 6e, 6xFFF)
      required:
        - id
        - variant

    # ── BeamCheckOption ──────────────────────────────────────
    BeamCheckOption:
      type: object
      description: Lightweight beam check info for DOC factor selection
      properties:
        id:
          type: string
          description: Beam identifier
        timestamp:
          type: string
          format: date-time
          description: Beam timestamp
        relOutput:
          type: number
          format: double
          description: Relative output value
        type:
          type: string
          description: Beam type
      required:
        - id
        - timestamp
        - relOutput
        - type

    # ── AcceptBeamRequest ────────────────────────────────────
    AcceptBeamRequest:
      type: object
      properties:
        beamIds:
          type: array
          items:
            type: string
          description: List of beam IDs to approve
        approvedBy:
          type: string
          description: Name of the person approving
      required:
        - beamIds
        - approvedBy

    # ── AcceptGeoCheckRequest ────────────────────────────────
    AcceptGeoCheckRequest:
      type: object
      properties:
        geoCheckIds:
          type: array
          items:
            type: string
          description: List of geometry check IDs to approve
        approvedBy:
          type: string
          description: Name of the person approving
      required:
        - geoCheckIds
        - approvedBy

    # ── Machine ──────────────────────────────────────────────
    Machine:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier for the machine
        name:
          type: string
          description: Name of the machine
        location:
          type: string
          description: Physical location of the machine
        type:
          type: string
          description: Type of machine
      required:
        - id
        - name
        - location
        - type

    # ── MonthlyResults ───────────────────────────────────────
    MonthlyResults:
      type: object
      properties:
        month:
          type: integer
          minimum: 1
          maximum: 12
          description: Month queried
        year:
          type: integer
          description: Year queried
        machineId:
          type: string
          description: Machine identifier
        checks:
          type: array
          items:
            $ref: '#/components/schemas/DayCheckStatus'
          description: Daily check statuses for the month
      required:
        - month
        - year
        - machineId
        - checks

    # ── DayCheckStatus ───────────────────────────────────────
    DayCheckStatus:
      type: object
      properties:
        date:
          type: string
          format: date
          description: Date of checks
        beamCheckStatus:
          type: string
          nullable: true
          enum: [pass, warning, fail]
          description: Overall beam check status for the day (null if no checks)
        geometryCheckStatus:
          type: string
          nullable: true
          enum: [pass, warning, fail]
          description: Overall geometry check status for the day (null if no checks)
        beamValue:
          type: number
          format: double
          nullable: true
          description: Representative beam metric value for display
        geometryValue:
          type: number
          format: double
          nullable: true
          description: Representative geometry metric value for display
        beamApproved:
          type: boolean
          description: Whether all beam checks for the day are approved
        geometryApproved:
          type: boolean
          description: Whether all geometry checks for the day are approved
        beamCount:
          type: integer
          description: Number of beam checks for the day
        geometryCheckCount:
          type: integer
          description: Number of geometry checks for the day
      required:
        - date

    # ── GeoCheck ─────────────────────────────────────────────
    GeoCheck:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier for the geometry check
        type:
          type: string
          description: Type of beam (e.g., 6xFFF)
        timestamp:
          type: string
          format: date-time
          description: UTC timestamp of the geometry check
        machineId:
          type: string
          description: Associated machine identifier
        path:
          type: string
          nullable: true
          description: File path to the geometry check data
        # IsoCenter group
        isoCenterSize:
          type: number
          format: double
          nullable: true
          description: Iso center size measurement
        isoCenterMVOffset:
          type: number
          format: double
          nullable: true
          description: Iso center MV offset measurement
        isoCenterKVOffset:
          type: number
          format: double
          nullable: true
          description: Iso center KV offset measurement
        # Beam group
        relativeOutput:
          type: number
          format: double
          nullable: true
          description: Relative output value
        relativeUniformity:
          type: number
          format: double
          nullable: true
          description: Relative uniformity value
        centerShift:
          type: number
          format: double
          nullable: true
          description: Center shift value
        # Collimation group
        collimationRotationOffset:
          type: number
          format: double
          nullable: true
          description: Collimation rotation offset measurement
        # Gantry group
        gantryAbsolute:
          type: number
          format: double
          nullable: true
          description: Gantry absolute measurement
        gantryRelative:
          type: number
          format: double
          nullable: true
          description: Gantry relative measurement
        # Enhanced Couch group
        couchMaxPositionError:
          type: number
          format: double
          nullable: true
          description: Maximum couch position error
        couchLat:
          type: number
          format: double
          nullable: true
          description: Couch lateral measurement
        couchLng:
          type: number
          format: double
          nullable: true
          description: Couch longitudinal measurement
        couchVrt:
          type: number
          format: double
          nullable: true
          description: Couch vertical measurement
        couchRtnFine:
          type: number
          format: double
          nullable: true
          description: Couch rotation fine measurement
        couchRtnLarge:
          type: number
          format: double
          nullable: true
          description: Couch rotation large measurement
        rotationInducedCouchShiftFullRange:
          type: number
          format: double
          nullable: true
          description: Rotation induced couch shift full range
        # MLC group
        mlcLeavesA:
          type: object
          additionalProperties:
            type: number
            format: double
          nullable: true
          description: MLC leaves bank A measurements keyed by leaf label (Leaf11-Leaf50)
        mlcLeavesB:
          type: object
          additionalProperties:
            type: number
            format: double
          nullable: true
          description: MLC leaves bank B measurements keyed by leaf label (Leaf11-Leaf50)
        maxOffsetA:
          type: number
          format: double
          nullable: true
          description: Maximum offset for MLC bank A
        maxOffsetB:
          type: number
          format: double
          nullable: true
          description: Maximum offset for MLC bank B
        meanOffsetA:
          type: number
          format: double
          nullable: true
          description: Mean offset for MLC bank A
        meanOffsetB:
          type: number
          format: double
          nullable: true
          description: Mean offset for MLC bank B
        # MLC Backlash group
        mlcBacklashA:
          type: object
          additionalProperties:
            type: number
            format: double
          nullable: true
          description: MLC backlash bank A measurements keyed by leaf label (Leaf11-Leaf50)
        mlcBacklashB:
          type: object
          additionalProperties:
            type: number
            format: double
          nullable: true
          description: MLC backlash bank B measurements keyed by leaf label (Leaf11-Leaf50)
        mlcBacklashMaxA:
          type: number
          format: double
          nullable: true
          description: Maximum backlash for MLC bank A
        mlcBacklashMaxB:
          type: number
          format: double
          nullable: true
          description: Maximum backlash for MLC bank B
        mlcBacklashMeanA:
          type: number
          format: double
          nullable: true
          description: Mean backlash for MLC bank A
        mlcBacklashMeanB:
          type: number
          format: double
          nullable: true
          description: Mean backlash for MLC bank B
        # Jaws group
        jawX1:
          type: number
          format: double
          nullable: true
          description: Jaw X1 measurement
        jawX2:
          type: number
          format: double
          nullable: true
          description: Jaw X2 measurement
        jawY1:
          type: number
          format: double
          nullable: true
          description: Jaw Y1 measurement
        jawY2:
          type: number
          format: double
          nullable: true
          description: Jaw Y2 measurement
        # Jaws Parallelism group
        jawParallelismX1:
          type: number
          format: double
          nullable: true
          description: Jaw parallelism X1 measurement
        jawParallelismX2:
          type: number
          format: double
          nullable: true
          description: Jaw parallelism X2 measurement
        jawParallelismY1:
          type: number
          format: double
          nullable: true
          description: Jaw parallelism Y1 measurement
        jawParallelismY2:
          type: number
          format: double
          nullable: true
          description: Jaw parallelism Y2 measurement
        # Metadata
        note:
          type: string
          nullable: true
          description: Notes about the geometry check
        approvedBy:
          type: string
          nullable: true
          description: Name of the person who accepted/signed off the geometry check
        approvedDate:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when the geometry check was accepted/signed off
        beamVariantId:
          type: string
          format: uuid
          nullable: true
          description: ID of the beam variant (FK to beam_variants)
      required:
        - id
        - type
        - timestamp
        - machineId

    # ── Threshold ────────────────────────────────────────────
    Threshold:
      type: object
      properties:
        machineId:
          type: string
          description: Machine identifier
        checkType:
          type: string
          enum: [geometry, beam]
          description: Type of check
        beamVariant:
          type: string
          nullable: true
          description: Beam variant (e.g., 6x, 6e)
        metricType:
          type: string
          description: Type of metric (e.g., Relative Output, Relative Uniformity, Center Shift)
        value:
          type: number
          nullable: true
          description: Threshold value
        lastUpdated:
          type: string
          format: date-time
          nullable: true
          description: Last update timestamp
      required:
        - machineId
        - checkType
        - metricType

    # ── Update ───────────────────────────────────────────────
    Update:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier for the update
        machineId:
          type: string
          description: Associated machine identifier
        info:
          type: string
          description: Update information
        type:
          type: string
          description: Type of update
      required:
        - id
        - machineId
        - info
        - type

    # ── DocFactor ────────────────────────────────────────────
    DocFactor:
      type: object
      description: Dose Output Correction factor. DOC Factor = MsdAbs / MpcRel
      properties:
        id:
          type: string
          format: uuid
          nullable: true
          description: Unique identifier (auto-generated on create)
        machineId:
          type: string
          description: Associated machine identifier
        beamVariantId:
          type: string
          format: uuid
          description: Associated beam variant ID (FK to beam_variants)
        beamVariantName:
          type: string
          nullable: true
          description: Beam variant name for display (not persisted)
        beamId:
          type: string
          format: uuid
          description: Reference to the specific beam check used for MPC relative value
        msdAbs:
          type: number
          format: double
          description: Measured absolute output from independent device
        mpcRel:
          type: number
          format: double
          description: MPC relative output from the selected beam check
        docFactorValue:
          type: number
          format: double
          description: Calculated DOC factor (MsdAbs / MpcRel)
        measurementDate:
          type: string
          format: date
          description: Date when the Msd Abs measurement was taken
        startDate:
          type: string
          format: date
          description: Start of validity period (inclusive)
        endDate:
          type: string
          format: date
          nullable: true
          description: End of validity period (exclusive). NULL means indefinite/current.
        createdAt:
          type: string
          format: date-time
          nullable: true
          description: Record creation timestamp
        updatedAt:
          type: string
          format: date-time
          nullable: true
          description: Record last-updated timestamp
        createdBy:
          type: string
          nullable: true
          description: User who created this record
      required:
        - machineId
        - beamVariantId
        - beamId
        - msdAbs
        - mpcRel
        - measurementDate
        - startDate

    # ── ReportRequest ────────────────────────────────────────
    ReportRequest:
      type: object
      description: Request payload for generating a PDF report
      properties:
        startDate:
          type: string
          format: date-time
          description: Start date for the report data (inclusive)
        endDate:
          type: string
          format: date-time
          description: End date for the report data (inclusive)
        machineId:
          type: string
          description: ID of the machine to generate the report for
        selectedChecks:
          type: array
          items:
            type: string
          description: List of selected check IDs (e.g., beam-6x, geo-gantry)
        timeZone:
          type: string
          nullable: true
          description: Client timezone (e.g., America/Chicago or -06:00)
      required:
        - startDate
        - endDate
        - machineId
        - selectedChecks

    # ── TimezoneRequest ──────────────────────────────────────
    TimezoneRequest:
      type: object
      properties:
        timezone:
          type: string
          description: IANA timezone identifier (e.g., America/Chicago)
      required:
        - timezone