version: "3.8"

services:
  # ── Postgres ──────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-mpc_plus}
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Ensure your backup file is here!
      - ./backups/mpc_full_backup.sql:/docker-entrypoint-initdb.d/backup.sql

  # ── Backend (.NET API) ────────────────────────────────────
  backend:
    build:
      context: ./backend/MPC-Plus/src/api
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5000:8080"
    environment:
      - ConnectionStrings__Database=Host=db;Port=5432;Database=${POSTGRES_DB:-mpc_plus};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}
      - CORS_ORIGINS=http://localhost:3000
    depends_on:
      - db
    volumes:
       # Persist uploaded images
      - ./backend/MPC-Plus/src/api/wwwroot/images:/app/wwwroot/images

  # ── Frontend (Next.js) ────────────────────────────────────
  frontend:
    build:
      context: ./frontend/mpc-plus
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Browser-side access (public URL)
      - NEXT_PUBLIC_API_URL=http://localhost:5000
    depends_on:
      - backend

volumes:
  pgdata:
