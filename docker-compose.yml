version: "3.8"

services:
  # ── Postgres ──────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-your_password_here}
      POSTGRES_DB: ${POSTGRES_DB:-mpc_plus}
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Ensure your backup file is here!
      - ./backups/mpc_plus_backup_20260226_152849.sql:/docker-entrypoint-initdb.d/backup.sql

  # ── Backend (.NET API) ────────────────────────────────────
  backend:
    build:
      context: ./backend/src/api
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5000:8080"
    environment:
      - ConnectionStrings__Database=Host=db;Port=5432;Database=${POSTGRES_DB:-mpc_plus};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-your_password_here}
      - CORS_ORIGINS=http://localhost:3000
    depends_on:
      - db
    volumes:
       # Persist uploaded images
      - ./backend/src/api/wwwroot/images:/app/wwwroot/images

  # ── Frontend (Next.js) ────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Browser-side access (public URL)
      - NEXT_PUBLIC_API_URL=http://localhost:5000
    depends_on:
      - backend

  # ── Python ETL Watchdog ───────────────────────────────────
  etl:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["start"]
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-your_password_here}
      - POSTGRES_DATABASE=${POSTGRES_DB:-mpc_plus}
    depends_on:
      - db
    volumes:
      # Mount the iDrive folder so the container can watch for new files
      - ./iDrive:/app/iDrive
      # Optional: Mount the Lexar drive if needed
      # - /Volumes/Lexar/MPC Data:/Volumes/Lexar/MPC Data

volumes:
  pgdata:
